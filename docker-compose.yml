version: '3.8'

services:
  mysql:
    image: mysql:9.0
    container_name: trailmandu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cloud
      MYSQL_DATABASE: trailmandu
    ports:
      # Exposed on 3307 on the host to avoid conflicting with any local MySQL running on 3306
      - "3307:3306"
    volumes:
      # Persist MySQL data in a docker volume
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trailmandu-redis
    restart: always
    ports:
      # Exposed on 6380 on the host to avoid conflicting with any local Redis running on 6379
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trailmandu-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - DATABASE_URL=mysql://root:cloud@mysql:3306/trailmandu?connection_limit=10&pool_timeout=20&allowPublicKeyRetrieval=true&useSSL=false&multipleStatements=true
      - REDIS_URL=redis://redis:6379
      - ACCESS_TOKEN_SECRET=44bac78259aa9c895330e95705e8251113321aff7776972a8b5f8718bd5ad901
      - REFRESH_TOKEN_SECRET=6aa0b9430e699bb9e609cc2f27b9c4bd63dc618576c1801ed6bcf9d0a8f6d17e
      - APP_NAME=trailmaindu
      - MAIL_ADMIN=admin@trailmandu.com
      - MAILTRAP_TOKEN=a06a97429342ce7a3f9e7fcceb83fb8b
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/prisma/import-backup.js && npm run start"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
